<div class="p-6 max-w-3xl mx-auto">
  @if (isLoading){
  <p class="text-gray-500">Loading product...</p>
  }@else if (errorMessage){
  <p class="bg-red-50 border border-red-200 text-red-700 rounded-md p-4">
    {{errorMessage}}
  </p>
  }@else if (product) {
  <div class="bg-white rounded-lg p-6 shadow-md">

    <img [src]="product.thumbnail" [alt]="product.title" class="w-full h-64 object-cover rounded-lg mb-4" />
    <h1 class="text-2xl font-bold mb-2 "> {{product.title}} </h1>
    <p class="text-gray-600 mb-4">{{product.description}}</p>
    <div class="flex justify-between items-center">
      <span class="text-2xl font-bold text-blue-600">${{product.price}}</span>
      <span class="text-sm text-gray-500">Brand: {{product.brand}}</span>
    </div>
  </div>
  }
</div>
