<button [disabled]="disabled" (click)="handleClick()" [class.bg-blue-600]="variant === 'primary'"
  [class.bg-gray-500]="variant === 'secondary'" [class.bg-red-600]="variant === 'danger'"
  class="text-white px-4 py-2 rounded-md hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed transition">
  <ng-content />
</button>
